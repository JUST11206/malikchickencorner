<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">

    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="{{ url_for('home') }}">

            <img src="{{ url_for('static', filename='images/logo/logo.png') }}"
                 alt="Malik Chicken Corner">

            <span>Malik Chicken Corner</span>

        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navbar -->

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Navigation Links -->

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('home') }}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('menu') }}">
                        Menu
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/gallery">
                        Gallery
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contact">
                        Contact
                    </a>
                </li>

            </ul>

            <!-- Right Side -->

            <div class="navbar-buttons d-flex align-items-center">

                <!-- Search -->

                <div class="nav-search">

                    <form action="{{ url_for('menu') }}" method="GET">

                        <input
                            type="text"
                            name="search"
                            placeholder="Search delicious food...">

                        <button type="submit">

                            <i class="fa-solid fa-magnifying-glass"></i>

                        </button>

                    </form>

                </div>

                <!-- Wishlist -->

                <a href="{{ url_for('wishlist') }}" class="icon-btn">

                    <i class="fa-solid fa-heart"></i>

                    <span class="badge">

                        {{ wishlist_count }}

                    </span>

                </a>

                <!-- Cart -->

                <a href="{{ url_for('cart') }}" class="icon-btn">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span class="badge">

                        {{ cart_count }}

                    </span>

                </a>

                <!-- Login / Profile -->

                {% if session.get("user_id") %}

                <a href="{{ url_for('dashboard') }}"
                   class="btn btn-danger btn-login ms-3">

                    <i class="fa-solid fa-user"></i>

                    Dashboard

                </a>

                <a href="{{ url_for('logout') }}"
                   class="btn btn-outline-light btn-login ms-2">

                    Logout

                </a>

                {% else %}

                <a href="{{ url_for('login') }}"
                   class="btn btn-danger btn-login ms-3">

                    <i class="fa-solid fa-right-to-bracket"></i>

                    Login

                </a>

                {% endif %}

            </div>

        </div>

    </div>

</nav>
