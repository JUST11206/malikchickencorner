{% extends 'layout/base.html' %}

{% block title %}
Edit Product
{% endblock %}

{% block css %}
<link rel="stylesheet"
href="{{ url_for('static', filename='css/edit_product.css') }}">
{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="card shadow-lg p-4 edit-card">

        <h2 class="text-center text-warning mb-4">

            ✏️ Edit Product

        </h2>

        <form method="POST"
              enctype="multipart/form-data">

            <!-- Product Name -->

            <div class="mb-3">

                <label class="form-label">

                    Product Name

                </label>

                <input
                    type="text"
                    class="form-control"
                    name="name"
                    value="{{ product.name }}"
                    required>

            </div>

            <!-- Description -->

            <div class="mb-3">

                <label class="form-label">

                    Description

                </label>

                <textarea
                    class="form-control"
                    rows="4"
                    name="description">{{ product.description }}</textarea>

            </div>

            <div class="row">

                <!-- Price -->

                <div class="col-md-4">

                    <label class="form-label">

                        Price

                    </label>

                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        name="price"
                        value="{{ product.price }}"
                        required>

                </div>

                <!-- Stock -->

                <div class="col-md-4">

                    <label class="form-label">

                        Stock

                    </label>

                    <input
                        type="number"
                        class="form-control"
                        name="stock"
                        value="{{ product.stock }}"
                        required>

                </div>

                <!-- Category -->

                <div class="col-md-4">

                    <label class="form-label">

                        Category

                    </label>

                    <select
                        class="form-select"
                        name="category_id">

                        {% for category in categories %}

                        <option
                            value="{{ category.id }}"
                            {% if category.id == product.category_id %}
                            selected
                            {% endif %}>

                            {{ category.name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <!-- Current Image -->

            <div class="mt-4">

                <label class="form-label">

                    Current Image

                </label>

                <br>

                {% if product.image %}

                <img
                    src="{{ url_for('static', filename=product.image) }}"
                    class="preview-image">

                {% else %}

                <p>No Image</p>

                {% endif %}

            </div>

            <!-- Upload New Image -->

            <div class="mt-4">

                <label class="form-label">

                    Change Image

                </label>

                <input
                    type="file"
                    class="form-control"
                    name="image">

            </div>

            <!-- Buttons -->

            <div class="mt-4 d-flex gap-3">

                <button
                    class="btn btn-warning flex-fill">

                    <i class="fas fa-save"></i>

                    Update Product

                </button>

                <a href="{{ url_for('manage_products') }}"
                   class="btn btn-secondary flex-fill">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
