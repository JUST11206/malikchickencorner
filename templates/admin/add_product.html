{% extends 'layout/base.html' %}

{% block title %}
Add Product
{% endblock %}

{% block css %}
<link rel="stylesheet"
href="{{ url_for('static', filename='css/admin_add_product.css') }}">
{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center text-danger mb-4">
            Add New Product
        </h2>

        <form method="POST"
              enctype="multipart/form-data">

            <!-- Product Name -->

            <div class="mb-3">

                <label class="form-label">
                    Product Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="name"
                    required>

            </div>

            <!-- Description -->

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                    class="form-control"
                    rows="4"
                    name="description"></textarea>

            </div>

            <div class="row">

                <!-- Price -->

                <div class="col-md-4">

                    <label class="form-label">
                        Price
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        name="price"
                        required>

                </div>

                <!-- Stock -->

                <div class="col-md-4">

                    <label class="form-label">
                        Stock
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        name="stock"
                        required>

                </div>
<!-- Category -->

<div class="col-md-4">

    <label class="form-label">
        Category
    </label>

    <select
        class="form-select"
        name="category_id"
        required>

        {% if categories %}

            {% for category in categories %}

            <option value="{{ category.id }}">
                {{ category.name }}
            </option>

            {% endfor %}

        {% else %}

            <option value="">
                No Category Available
            </option>

        {% endif %}

    </select>

</div>
            <!-- Image -->

            <div class="mt-3">

                <label class="form-label">
                    Product Image
                </label>

                <input
                    type="file"
                    class="form-control"
                    name="image">

            </div>

            <button
                class="btn btn-danger w-100 mt-4">

                Save Product

            </button>

        </form>

    </div>

</div>

{% endblock %}
